<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MightYoung - Attachment Upload</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#24A1DE",
                        "tech-blue": "#24A1DE",
                        "success-green": "#07C160",
                        "danger-red": "#ff4b2b",
                        "background-light": "#ffffff",
                        "background-dark": "#f5f7fa",
                    },
                    fontFamily: {
                        "display": ["Microsoft YaHei", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }</script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .tactile-card {
            background: #ffffff;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .neon-border-blue {
            box-shadow: 0 4px 20px rgba(36, 161, 222, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-display text-slate-100 min-h-screen overflow-hidden bg-slate-50">
<!-- Screen Content Simulation (The background screen 8) -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-center p-6 body-bg overflow-hidden" style="background: #0a0a0a;">
<!-- Mock Content Background -->
<div class="w-full max-w-md space-y-6 opacity-30 pointer-events-none">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">person</span>
</div>
<div class="flex-1 space-y-2">
<div class="h-4 bg-slate-700 rounded w-1/2"></div>
<div class="h-3 bg-slate-800 rounded w-1/4"></div>
</div>
</div>
<div class="h-40 w-full rounded-xl bg-slate-800/50"></div>
<div class="space-y-3">
<div class="h-3 bg-slate-800 rounded w-full"></div>
<div class="h-3 bg-slate-800 rounded w-full"></div>
<div class="h-3 bg-slate-800 rounded w-2/3"></div>
</div>
</div>
<!-- The + Button Trigger (Visual Context) -->
<div class="fixed bottom-10 right-6">
<button class="w-14 h-14 bg-primary text-white rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<!-- Bottom Sheet Overlay (Active State) -->
<div class="fixed inset-0 bg-white/40 backdrop-blur-md flex flex-col justify-end z-50">
<!-- Dismissal area -->
<div class="flex-1 w-full"></div>
<!-- Bottom Sheet Content -->
<div class="tactile-card rounded-t-[2.5rem] w-full max-w-md mx-auto px-6 pb-12 pt-4 shadow-2xl neon-border-blue">
<!-- Handle -->
<div class="flex justify-center mb-6">
<div class="w-12 h-1.5 rounded-full bg-slate-600/50"></div>
</div>
<div class="mb-8 text-center">
<h2 class="text-xl font-semibold tracking-tight text-slate-900">上传附件</h2>
<p class="text-slate-400 text-sm mt-1">选择分享文件类型</p>
</div>
<div class="grid grid-cols-1 gap-4">
<!-- Image Option -->
<button class="group flex items-center justify-between p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:border-tech-blue/30 hover:bg-tech-blue/5 transition-all duration-300">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-tech-blue/20 flex items-center justify-center text-tech-blue group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl">image</span>
</div>
<div class="text-left">
<span class="block text-base font-medium text-slate-800">图片</span>
<span class="block text-xs text-slate-500">JPG, PNG, GIF, WebP</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-600 group-hover:text-tech-blue">chevron_right</span>
</button>
<!-- File Option -->
<button class="group flex items-center justify-between p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:border-tech-blue/30 hover:bg-tech-blue/5 transition-all duration-300">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-tech-blue/20 flex items-center justify-center text-tech-blue group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl">description</span>
</div>
<div class="text-left">
<span class="block text-base font-medium text-slate-800">文件</span>
<span class="block text-xs text-slate-500">PDF, DOC, ZIP (最大 50MB)</span>
</div>
</div>
<span class="material-symbols-outlined text-slate-600 group-hover:text-tech-blue">chevron_right</span>
</button>
</div>
<div class="mt-8 flex justify-center">
<button class="text-sm font-medium hover:text-tech-blue transition-colors px-4 py-2 text-slate-600">取消</button>
</div>
</div>
</div>
</div>
</body></html>
