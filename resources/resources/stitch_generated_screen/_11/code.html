<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0088cc", // Telegram Blue style
                        "background-light": "#f8fbff",
                        "background-dark": "#0a1118",
                        "success": "#07c160", // WeChat Green style
                    },
                    fontFamily: {
                        "display": ["Microsoft YaHei", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: "Microsoft YaHei", "Public Sans", sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center p-4 justify-between max-w-lg mx-auto">
<div class="text-slate-600 dark:text-slate-300 flex size-10 items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined" style="">arrow_back</span>
</div>
<h1 class="text-slate-900 dark:text-white text-lg font-bold flex-1 text-center" style="">设备详情</h1>
<div class="size-10 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300" style="">more_horiz</span>
</div>
</div>
</header>
<main class="max-w-lg mx-auto pb-24">
<!-- Header Section -->
<section class="p-4 flex flex-col items-center">
<div class="w-full bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 p-6 flex flex-col items-center">
<div class="bg-slate-100 dark:bg-slate-800 aspect-video w-full rounded-lg mb-6 flex items-center justify-center bg-cover bg-center" data-alt="Industrial air compressor unit in factory setting" style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuBogZlb7QcNZ5h4MOQtfW2xxxuhGK4geaMVJlK7_1DWq_mOVgW0XzLYg-1Qk1HvBU7jK6sjGxKVh2xGTW6J3AevvF4s3xW42Kld1y7OWBPkxQUGkkSvoPm0RatQRLqdAlghSo8LhJG3n7rrOzHGArFXXbxlS2rEFZax4z75x4UXVkMxEAleHlP_dGQPvCCstecaYcqpZ42MF1ymGfE7pUddXhRHVFv219HEGIh0AD3Ui_J0zjDnQmzRRTIHU4QklmPvDYZTLt-t4PE&quot;);">
</div>
<div class="text-center">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2" style="">空气压缩机 MTR-09</h2>
<div class="flex items-center justify-center gap-2">
<span class="flex h-2 w-2 rounded-full bg-success"></span>
<span class="text-success text-sm font-semibold" style="">运行中</span>
<span class="mx-2 text-slate-300 dark:text-slate-600" style="">|</span>
<span class="text-slate-500 dark:text-slate-400 text-sm" style="">EQ-2023-0852</span>
</div>
</div>
</div>
</section>
<!-- Real-time Parameters Grid -->
<section class="px-4 mb-6">
<h3 class="text-slate-900 dark:text-white text-base font-bold mb-3 flex items-center gap-2" style="">
<span class="material-symbols-outlined text-primary text-xl" style="">monitoring</span>
                实时运行参数
            </h3>
<div class="grid grid-cols-3 gap-3">
<div class="bg-white dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<p class="text-slate-500 dark:text-slate-400 text-xs mb-1" style="">出口压力</p>
<div class="flex items-baseline gap-1">
<span class="text-xl font-bold text-primary" style="">0.82</span>
<span class="text-[10px] text-slate-400" style="">MPa</span>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<p class="text-slate-500 dark:text-slate-400 text-xs mb-1" style="">排气温度</p>
<div class="flex items-baseline gap-1">
<span class="text-xl font-bold text-primary" style="">78</span>
<span class="text-[10px] text-slate-400" style="">℃</span>
</div>
</div>
<div class="bg-white dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<p class="text-slate-500 dark:text-slate-400 text-xs mb-1" style="">振动频率</p>
<div class="flex items-baseline gap-1">
<span class="text-xl font-bold text-primary" style="">4.2</span>
<span class="text-[10px] text-slate-400" style="">mm/s</span>
</div>
</div>
</div>
</section>
<!-- Basic Info Card -->
<section class="px-4 mb-6">
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="p-4 border-b border-slate-100 dark:border-slate-800">
<h3 class="text-slate-900 dark:text-white text-base font-bold" style="">基本信息</h3>
</div>
<div class="p-4 space-y-4">
<div class="flex justify-between items-center">
<span class="text-slate-500 dark:text-slate-400 text-sm" style="">型号</span>
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium" style="">MTR-09-V3</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-500 dark:text-slate-400 text-sm" style="">安装日期</span>
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium" style="">2023-05-12</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-500 dark:text-slate-400 text-sm" style="">所在区域</span>
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium" style="">B3 生产车间</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-500 dark:text-slate-400 text-sm" style="">负责人</span>
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-primary/20 text-primary flex items-center justify-center text-[10px] font-bold" style="">张</div>
<span class="text-slate-900 dark:text-slate-100 text-sm font-medium" style="">张建国</span>
</div>
</div>
</div>
</div>
</section>
<!-- Inspection History -->
<section class="px-4 mb-6">
<div class="flex justify-between items-center mb-3">
<h3 class="text-slate-900 dark:text-white text-base font-bold" style="">检查记录</h3>
<button class="text-primary text-sm font-medium flex items-center gap-1" style="">
                    查看全部 <span class="material-symbols-outlined text-sm" style="">chevron_right</span>
</button>
</div>
<div class="space-y-3">
<!-- Record 1 -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex justify-between items-center">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-lg bg-success/10 flex items-center justify-center text-success">
<span class="material-symbols-outlined" style="">task_alt</span>
</div>
<div>
<p class="text-slate-900 dark:text-white text-sm font-bold" style="">常规季度巡检</p>
<p class="text-slate-500 dark:text-slate-400 text-xs" style="">2024-01-15 14:30</p>
</div>
</div>
<span class="text-xs font-bold text-success bg-success/10 px-2 py-1 rounded" style="">正常</span>
</div>
<!-- Record 2 -->
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex justify-between items-center opacity-70">
<div class="flex gap-3 items-center">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="">history</span>
</div>
<div>
<p class="text-slate-900 dark:text-white text-sm font-bold" style="">例行维保</p>
<p class="text-slate-500 dark:text-slate-400 text-xs" style="">2023-11-20 09:15</p>
</div>
</div>
<span class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded" style="">已完成</span>
</div>
</div>
</section>
</main>
<!-- Bottom Actions -->
<footer class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 p-4">
<div class="max-w-lg mx-auto flex gap-4">
<button class="flex-1 bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined" style="">assignment_turned_in</span>
                开始检查</button>
<button class="w-14 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl flex items-center justify-center" style="">
<span class="material-symbols-outlined" style="">chat_bubble</span>
</button>
</div>
</footer>
</body></html>
