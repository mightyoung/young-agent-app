<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00BFFF",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Microsoft YaHei", "微软雅黑", "sans-serif", "Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(34, 22, 16, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00BFFF, transparent);
            box-shadow: 0 0 15px #00BFFF;
        }
    </style>
<style>
        .glass-panel {
            background: rgba(34, 22, 16, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00BFFF, transparent);
            box-shadow: 0 0 15px #00BFFF;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 overflow-hidden">
<div class="relative h-screen w-full flex flex-col">
<!-- Camera Viewfinder Background -->
<div class="absolute inset-0 z-0 bg-neutral-900">
<div class="w-full h-full bg-cover bg-center opacity-80" data-alt="Blurred industrial warehouse interior view for camera background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBExcf_BUToS94EmrtzyTh5znQYmNdOxWSyfP_26wU-Z-gPstIsUTUJGKN3nVVbUqM9Z_0RY8rbGCi6z_LHzVge7XYWeIwwIrWnbn63Co4idA68MwVBqh2isC00efPKSzdHTmSwAcx4AWHMKaRGilC4RHrQIc9KjWbHXFbBqwFn5H_Kp1zvivmigFfWNd3G5AWVQb6IjR-5SQLs2sW6A1JpYdyAqhBlErfiwhKnPNbx9GWiUQVjLMmjebSWMDgHo9HSNYM3gve07e8')">
</div>
<!-- Scanning UI Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="relative w-72 h-72 border-2 border-primary/40 rounded-xl">
<!-- Corner Brackets -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Pulsing Scanning Line -->
<div class="scanner-line absolute w-full top-1/2 -translate-y-1/2"></div>
</div>
</div>
</div>
<!-- Top Navigation Bar -->
<div class="relative z-10 flex items-center justify-between px-4 mt-6 w-full">
<button class="flex items-center justify-center w-12 h-12 rounded-xl bg-black/40 backdrop-blur-md border border-white/10 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">chevron_left</span>
</button>
<button class="flex items-center justify-center w-12 h-12 rounded-xl bg-black/40 backdrop-blur-md border border-white/10 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">flash_on</span>
</button>
</div>
<!-- Spacer -->
<div class="flex-grow"></div>
<!-- Bottom Controls Area -->
<div class="relative z-10 pb-12 pt-8 px-6">
<!-- Text Prompt -->
<div class="flex justify-center mb-10">
<p class="glass-panel px-4 py-2 rounded-full text-xs font-medium text-slate-100 border border-white/10 tracking-wide" style="">
                    请将台账或条码放入框内
                </p>
</div>
<!-- Main Interaction Bar -->
<div class="relative flex items-center justify-center max-w-sm mx-auto w-full">
<!-- Album Button -->
<!-- Shutter Button -->
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 bg-primary/20 rounded-full animate-ping scale-110"></div>
<button class="relative w-20 h-20 rounded-full border-[6px] border-white flex items-center justify-center active:scale-90 transition-transform bg-transparent" style="">
<div class="w-16 h-16 rounded-full bg-white shadow-lg"></div>
</button>
</div>
<!-- QR Scan Toggle -->
<button class="flex flex-col items-center gap-1 group absolute right-0" style="">
<div class="w-12 h-12 rounded-full glass-panel border border-white/10 flex items-center justify-center group-active:scale-95 transition-transform"><span class="material-symbols-outlined text-2xl text-slate-100">fact_check</span></div>
<span class="text-[10px] uppercase font-bold tracking-tighter opacity-60" style="">填报检查</span>
</button>
</div>
</div>
<!-- Safe Area Indicator (Visual only) -->
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</body></html>
