<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007AFF",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Microsoft YaHei", "Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Microsoft YaHei", "Public Sans", sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 justify-between bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">提交结果</h2>
</div>
<!-- Success Status Section -->
<div class="flex flex-col px-6 py-12">
<div class="flex flex-col items-center gap-6">
<div class="flex items-center justify-center w-24 h-24 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined !text-6xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">check_circle</span>
</div>
<div class="flex flex-col items-center gap-2">
<p class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight text-center">提交成功</p>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal text-center">您的检查记录已成功上传至系统</p>
</div>
</div>
</div>
<!-- Information Card -->
<div class="px-4">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800 p-6 flex flex-col gap-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight border-b border-slate-50 dark:border-slate-800 pb-4">检查信息摘要</h3>
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">设备名称</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">MTR-082-A</p>
</div>
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">检查状态</p>
<div class="bg-green-100 dark:bg-green-900/30 px-3 py-1 rounded-full">
<p class="text-green-600 dark:text-green-400 text-xs font-bold">全部合格</p>
</div>
</div>
<div class="flex justify-between items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">检查时间</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-normal">2026-05-20 14:30</p>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-auto p-6 flex flex-col gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-wide w-full shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
<span class="truncate">查看检查详情</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary/10 text-primary text-base font-bold leading-normal tracking-wide w-full hover:bg-primary/20 transition-colors">
<span class="truncate">回到首页</span>
</button>
</div>
<!-- Spacer for visual balance -->
<div class="h-8"></div>
</div>
</body></html>
